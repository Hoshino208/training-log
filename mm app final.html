<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Muscle &amp; Meal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111;--paper:#f8f4ed;--paper2:#f0ead9;--paper3:#e8dfc8;
  --rule:#c5b99a;--rule2:#a89878;
  --red:#b83232;--red-bg:#fdf0f0;--red-border:#e8c0c0;
  --grn:#1e6b3a;--grn-bg:#f0f8f2;--grn-border:#aad4b8;
  --blu:#1b4f82;--blu-bg:#f0f4fc;--blu-border:#a8c0e0;
  --pur:#5c3487;--pur-bg:#f4f0fc;--pur-border:#c4a8e4;
  --amb:#9a5210;--amb-bg:#fdf6ec;--amb-border:#e0c090;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;
  padding-bottom:60px;
}
/* ── APP SHELL ── */
.shell{max-width:430px;width:100%;margin:0 auto;position:relative}
/* ── HEADER ── */
.hdr{
  border-bottom:3px double var(--ink);
  padding:12px 16px 10px;
  background:var(--paper);
  position:sticky;
  top:0;
  z-index:50;
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hdr-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--rule2);letter-spacing:.1em;text-transform:uppercase}
.hdr-phase{font-family:'DM Mono',monospace;font-size:9px;background:var(--ink);color:var(--paper);padding:2px 7px;border-radius:2px;letter-spacing:.06em}
.hdr-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:900;line-height:1.1;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:var(--rule2);margin-top:2px;font-family:'DM Mono',monospace}
/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--ink);
  display:flex;
  z-index:100;
  max-width:430px;
  margin:0 auto;
  border-top:1px solid #333;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:9px 4px 12px;border:none;background:transparent;
  color:#777;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:10px;
  gap:4px;transition:color .15s;letter-spacing:.05em;
  touch-action:manipulation;
  -webkit-appearance:none;
  min-height:48px;
}
.nb:active{background:rgba(255,255,255,0.1)}
.nb.on{color:#f8f4ed}
.nb-ico{font-size:16px;line-height:1}
/* ── SCROLL AREA ── */
.scroll{padding-bottom:8px}
/* ── PAGES ── */
.pg{display:none}.pg.on{display:block}
/* ── LABELS ── */
.lbl{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
  color:var(--rule2);text-transform:uppercase;letter-spacing:.12em;
  padding:13px 16px 6px;border-bottom:1px solid var(--rule);
  margin-bottom:0;
}
/* ── WEEK SCROLLER ── */
.wscroll{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 0 2px}
.wscroll::-webkit-scrollbar{display:none}
.wtrack{display:flex;width:max-content;padding:10px 16px;gap:10px}
/* ── DAY CARD ── */
.dcard{
  width:300px;flex-shrink:0;
  background:white;
  border:1.5px solid var(--rule);
  border-radius:var(--r);
  overflow:hidden;
}
.dcard.now{border-color:var(--ink);border-width:2px;box-shadow:3px 3px 0 var(--ink)}
.dcard-hdr{
  padding:8px 11px 7px;
  border-bottom:1.5px solid var(--rule);
  display:flex;align-items:center;gap:8px;
  background:var(--paper2);
}
.dnum{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;line-height:1;color:var(--ink)}
.dlwrap{flex:1}
.dlname{font-family:'DM Mono',monospace;font-size:9px;color:var(--rule2)}
.dltype{font-family:'Noto Serif JP',serif;font-size:12px;font-weight:700}
.dtag{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:2px;font-weight:500}
.dcard-body{padding:9px 11px 10px}
/* exercises */
.ex-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.exrow{display:block;padding:6px 0;border-bottom:1px solid var(--paper3);font-size:11px}
.exrow:last-child{border-bottom:none}
.exrow-head{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px}
.exdot{width:3px;height:3px;border-radius:50%;background:var(--ink);flex-shrink:0;margin-top:5px}
.exn{font-weight:700;flex:1}
.exs{font-family:'DM Mono',monospace;font-size:9px;color:var(--rule2);white-space:nowrap;background:var(--paper2);padding:1px 5px;border-radius:2px}
.exhow{font-size:10px;color:#555;line-height:1.45;padding-left:8px;margin-bottom:2px}
.extip{font-size:10px;color:var(--amb);line-height:1.45;padding-left:8px;background:var(--amb-bg);border-left:2px solid var(--amb);padding:3px 6px;margin-top:3px;border-radius:0 3px 3px 0}
/* meals */
.msec{margin-top:8px}
.mlbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.mitem{border-radius:var(--rs);overflow:hidden;margin-bottom:4px}
.mitem:last-child{margin-bottom:0}
.mstrip{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;color:white;letter-spacing:.06em}
.mbody{padding:5px 7px 6px;border:1px solid;border-top:none;border-radius:0 0 var(--rs) var(--rs)}
.mname{font-weight:700;font-size:11px;line-height:1.3;margin-bottom:2px}
.mdetail{font-size:10px;color:#666;line-height:1.4;margin-bottom:3px}
.malt{font-size:9px;color:#aaa;margin-bottom:3px}
.mmacros{display:flex;gap:3px;flex-wrap:wrap}
.mpill{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:500}
/* meal themes */
.m朝食 .mstrip{background:var(--red)}.m朝食 .mbody{background:var(--red-bg);border-color:var(--red-border)}.m朝食 .mpill{background:#fde0e0;color:var(--red)}
.m昼食 .mstrip{background:var(--grn)}.m昼食 .mbody{background:var(--grn-bg);border-color:var(--grn-border)}.m昼食 .mpill{background:#d4eedd;color:var(--grn)}
.m夕食 .mstrip{background:var(--blu)}.m夕食 .mbody{background:var(--blu-bg);border-color:var(--blu-border)}.m夕食 .mpill{background:#d0e4f4;color:var(--blu)}
.m補食 .mstrip{background:var(--pur)}.m補食 .mbody{background:var(--pur-bg);border-color:var(--pur-border)}.m補食 .mpill{background:#e4d8f4;color:var(--pur)}
.m間食 .mstrip{background:var(--amb)}.m間食 .mbody{background:var(--amb-bg);border-color:var(--amb-border)}.m間食 .mpill{background:#fce8d0;color:var(--amb)}
/* ── PREP CARD ── */
.prep-card{
  margin:10px 16px 0;
  border:2px solid var(--ink);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:3px 3px 0 var(--ink);
  background:white;
}
.prep-hdr{background:var(--ink);color:var(--paper);padding:8px 12px;font-family:'Noto Serif JP',serif;font-size:12px;font-weight:700}
.prep-body{padding:10px 12px}
.prep-rice{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:2px solid var(--rule);margin-bottom:8px}
.prep-rice-ico{font-size:24px}
.prep-rice-amt{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--amb)}
.prep-rice-note{font-size:10px;color:var(--rule2);margin-top:1px}
.prep-slbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.pitem{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--paper3);font-size:12px}
.pitem:last-child{border-bottom:none}
.pitem input[type=checkbox]{width:14px;height:14px;margin-top:2px;flex-shrink:0;accent-color:var(--ink);cursor:pointer}
.pitem label{flex:1;cursor:pointer;line-height:1.4}
.pitem label.ck{text-decoration:line-through;color:#bbb}
.cook-item{font-size:11px;color:#666;padding:3px 0;border-bottom:1px solid var(--paper3)}
.cook-item:last-child{border-bottom:none}
/* ── LOG FORM ── */
.fsec{padding:0 16px;margin-bottom:12px}
.fcard{background:white;border:1.5px solid var(--rule);border-radius:var(--r);padding:11px 13px;box-shadow:2px 2px 0 var(--rule)}
.flbl{font-family:'DM Mono',monospace;font-size:8px;font-weight:500;color:var(--rule2);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:3px}
input[type=text],input[type=number],select,textarea{
  background:var(--paper2);border:1.5px solid var(--rule2);border-radius:var(--rs);
  color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:7px 9px;width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink);background:white}
textarea{resize:vertical;min-height:52px;line-height:1.5}
.frow{display:flex;gap:6px;margin-bottom:8px}
.frow>*{flex:1;margin-bottom:0}
.fgrp{margin-bottom:8px}
/* ── AI PFC SECTION ── */
.pfc-ai-wrap{background:var(--paper2);border-radius:var(--rs);padding:9px 11px;margin-top:8px;border:1.5px solid var(--rule)}
.pfc-ai-title{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-badge{background:var(--ink);color:var(--paper);font-size:8px;padding:1px 6px;border-radius:2px;font-family:'DM Mono',monospace}
.meal-input-row{
  display:flex;gap:6px;align-items:flex-end;margin-bottom:6px;
  background:white;border:1px solid var(--rule);border-radius:var(--rs);padding:7px 8px;
}
.meal-input-row.loading{opacity:.6}
.mit-body{flex:1;min-width:0}
.mit-timing{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);margin-bottom:3px}
.mit-name{font-size:13px;font-weight:500}
.mit-pfc{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mit-pill{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px}
.mit-pill.p{background:var(--red-bg);color:var(--red)}
.mit-pill.c{background:var(--grn-bg);color:var(--grn)}
.mit-pill.f{background:var(--amb-bg);color:var(--amb)}
.mit-pill.q{background:var(--paper3);color:var(--rule2);font-style:italic}
.mit-del{background:none;border:none;color:var(--rule2);font-size:15px;cursor:pointer;padding:0;flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
/* add meal UI */
.meal-add-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:8px}
.meal-add-row select{width:auto;flex-shrink:0;font-size:12px;padding:6px 8px}
.meal-add-row input{flex:1}
.meal-add-row button{flex-shrink:0;padding:7px 10px;border:none;background:var(--ink);color:var(--paper);border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.meal-add-row button:disabled{opacity:.5;cursor:default}
/* pfc totals */
.pfc-totals{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--rule)}
.pt{flex:1;text-align:center;background:white;border-radius:var(--rs);padding:5px 3px;border:1px solid var(--rule)}
.pt-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2)}
.pt-v{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.pfc-progress{margin-top:6px}
.pfc-progress-row{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:8px;color:var(--rule2);margin-bottom:2px}
.pfc-bar-track{height:4px;background:var(--rule);border-radius:2px;overflow:hidden}
.pfc-bar-fill{height:4px;background:var(--red);border-radius:2px;transition:width .4s}
/* ── TEMPLATE ── */
.tmpl-wrap{margin:0 16px 14px;border:2px solid var(--ink);border-radius:var(--r);overflow:hidden;box-shadow:2px 2px 0 var(--ink)}
.tmpl-hdr{background:var(--ink);color:var(--paper);padding:8px 12px;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;font-family:'Noto Serif JP',serif}
.tmpl-body{padding:10px 12px;background:white}
.tmpl-body pre{font-family:'DM Mono',monospace;font-size:10px;white-space:pre-wrap;word-break:break-word;background:var(--paper2);border-radius:var(--rs);padding:9px;border:1px solid var(--rule);line-height:1.6}
.copy-btn{background:var(--paper);color:var(--ink);border:none;border-radius:2px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em;touch-action:manipulation;-webkit-appearance:none;min-height:32px}
/* ── BUTTONS ── */
button{touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:rgba(0,0,0,0.1)}
.btn{border-radius:var(--rs);padding:14px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%;border:none;transition:opacity .15s;letter-spacing:.03em;min-height:48px}
.btn-ink{background:var(--ink);color:var(--paper)}.btn-ink:active{opacity:.7}
/* ── HISTORY ── */
.hist-item{margin:0 16px 8px;background:white;border:1px solid var(--rule);border-radius:var(--r);padding:10px 12px}
.hist-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--rule2);margin-bottom:3px}
.hist-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;margin-bottom:3px}
.hist-body{font-size:11px;color:#666;line-height:1.5}
/* ── MISC ── */
.empty{text-align:center;padding:28px 16px;color:#ccc;font-family:'DM Mono',monospace;font-size:11px}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--rule);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.notice{background:var(--blu-bg);border:1px solid var(--blu-border);border-radius:var(--rs);padding:8px 10px;font-size:11px;color:var(--blu);margin:10px 16px 0;line-height:1.5}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-date" id="hdr-date"></div>
      <div class="hdr-phase" id="hdr-phase"></div>
    </div>
    <div class="hdr-title" id="hdr-title"></div>
    <div class="hdr-sub" id="hdr-sub"></div>
  </div>

  <!-- SCROLL -->
  <div class="scroll">

    <!-- ── WEEK PAGE ── -->
    <div id="pg-week" class="pg on">
      <div class="lbl">今週のスケジュール →</div>
      <div class="wscroll"><div class="wtrack" id="wtrack"></div></div>
      <div class="lbl" style="margin-top:4px">今夜の準備</div>
      <div id="prep-sec"></div>
    </div>

    <!-- ── LOG PAGE ── -->
    <div id="pg-log" class="pg">
      <div class="lbl">今日を記録する</div>

      <div class="fsec" style="margin-top:10px">
        <div class="fcard">
          <label class="flbl">筋トレメニュー</label>
          <div class="fgrp">
            <select id="log-day">
              <option value="土：腹筋">土：腹筋＋有酸素</option>
              <option value="日：休養">日：完全休養日</option>
              <option value="月：上半身A">月：上半身A（胸・肩・三頭）</option>
              <option value="火：休養">火：休養日</option>
              <option value="水：下半身">水：下半身（脚・臀部）</option>
              <option value="木：休養">木：休養日</option>
              <option value="金：上半身B">金：上半身B（背中・二頭）</option>
            </select>
          </div>
          <div class="frow">
            <div><label class="flbl">体重 (kg)</label><input type="number" id="log-wt" placeholder="68.0" step="0.1" min="40" max="150"></div>
            <div><label class="flbl">達成度</label>
              <select id="log-rating">
                <option value="3">★★★ 完璧</option>
                <option value="2" selected>★★☆ まあまあ</option>
                <option value="1">★☆☆ きつかった</option>
              </select>
            </div>
          </div>
          <div class="fgrp">
            <label class="flbl">メモ</label>
            <textarea id="log-note" placeholder="例：プッシュアップ 4×12、膝付きなしで完遂"></textarea>
          </div>
        </div>
      </div>

      <div class="fsec">
        <div class="fcard">
          <div class="pfc-ai-title">
            食事記録
            <span class="ai-badge">AI PFC推定</span>
          </div>
          <div class="notice">① 食事名を入力して「推定」→ 質問文がクリップボードにコピー<br>② チャット欄に貼り付けて送信 → Claudeの返信のPFC数値を入力</div>
          <div style="margin-top:8px">
            <div class="meal-add-row">
              <select id="add-timing">
                <option value="朝食">朝食</option>
                <option value="昼食">昼食</option>
                <option value="夕食" selected>夕食</option>
                <option value="補食">補食</option>
                <option value="間食">間食</option>
              </select>
              <input type="text" id="add-name" placeholder="例：鶏むね丼＋みそ汁" onkeydown="if(event.key==='Enter')addMeal()">
              <button id="add-btn" onclick="addMeal()" style="touch-action:manipulation;-webkit-appearance:none;min-height:44px;padding:0 16px">推定</button>
            </div>
            <div id="manual-row" style="display:none;margin-bottom:8px;background:var(--paper3);border-radius:var(--rs);padding:9px;border:1.5px solid var(--rule2)">
              <div id="manual-note" style="font-size:11px;line-height:1.5;margin-bottom:7px;color:var(--rule2)">Claudeの返信から数値をここに入力 →</div>
              <div style="display:flex;gap:5px;margin-bottom:7px">
                <div style="flex:1"><label class="flbl">P(g)</label><input type="number" id="man-p" placeholder="0" min="0" max="300"></div>
                <div style="flex:1"><label class="flbl">C(g)</label><input type="number" id="man-c" placeholder="0" min="0" max="600"></div>
                <div style="flex:1"><label class="flbl">F(g)</label><input type="number" id="man-f" placeholder="0" min="0" max="200"></div>
              </div>
              <button onclick="confirmMeal()" style="width:100%;padding:12px;border:none;background:var(--ink);color:var(--paper);border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-bottom:6px;min-height:48px;touch-action:manipulation;-webkit-appearance:none">確定して追加</button>
              <button onclick="cancelMeal()" style="width:100%;padding:10px;border:1px solid var(--rule);background:transparent;border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--rule2);font-family:'Noto Sans JP',sans-serif;min-height:42px;touch-action:manipulation;-webkit-appearance:none">キャンセル</button>
            </div>
            <div id="meal-list"></div>
            <div class="pfc-totals">
              <div class="pt"><div class="pt-l">P</div><div class="pt-v" id="tot-p" style="color:var(--red)">0g</div></div>
              <div class="pt"><div class="pt-l">C</div><div class="pt-v" id="tot-c" style="color:var(--grn)">0g</div></div>
              <div class="pt"><div class="pt-l">F</div><div class="pt-v" id="tot-f" style="color:var(--amb)">0g</div></div>
              <div class="pt"><div class="pt-l">kcal</div><div class="pt-v" id="tot-k">0</div></div>
            </div>
            <div class="pfc-progress">
              <div class="pfc-progress-row"><span>P目標 136g</span><span id="p-pct">0%</span></div>
              <div class="pfc-bar-track"><div class="pfc-bar-fill" id="p-bar" style="width:0%"></div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="fsec"><button class="btn btn-ink" onclick="saveLog()">記録を保存する</button></div>

      <div class="lbl">Claudeへ送るテンプレ</div>
      <div class="tmpl-wrap">
        <div class="tmpl-hdr"><span>📋 今日の記録テンプレ</span><button class="copy-btn" onclick="copyTmpl()">COPY</button></div>
        <div class="tmpl-body">
          <div style="font-size:10px;color:#888;font-family:'DM Mono',monospace;margin-bottom:4px">コピーしてこのチャットに貼り付けるとアドバイスをもらえます</div>
          <pre id="tmpl-text"></pre>
        </div>
      </div>

}

// STORAGE
// ═══════════════════════════════════════════════
const LS_KEY='mm_v4';
function getAll(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){return {}}}
function setAll(d){try{localStorage.setItem(LS_KEY,JSON.stringify(d))}catch(e){}}
function today(){return new Date().toISOString().slice(0,10)}
function getLog(dt){const a=getAll();return a[dt]||{workout:null,meals:[],wt:null,note:'',rating:2,prep:{}}}
function saveLog2(dt,d){const a=getAll();a[dt]=d;setAll(a)}

// ═══════════════════════════════════════════════
// HEADER
// ═══════════════════════════════════════════════
function renderHdr(){
  const d=new Date(),dow=d.getDay();
  const diff=Math.floor((d-new Date(START))/86400000);
  const day1=Math.max(1,diff+1),wk=Math.max(1,Math.ceil(day1/7)),ph=wk<=12?1:wk<=32?2:3;
  document.getElementById('hdr-date').textContent=d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('hdr-phase').textContent=`PH${ph} W${wk}`;
  document.getElementById('hdr-title').textContent=WO[dow]?WO[dow].label:(dow===0?'完全休養日':'休養日');
  document.getElementById('hdr-sub').textContent=`開始${day1}日目 · P目標136g/日 · 68kg`;
}

// ═══════════════════════════════════════════════
// WEEK PAGE
// ═══════════════════════════════════════════════
function renderWeek(){
  const today_d=new Date(),todDow=today_d.getDay();
  // 「今週の土曜」を起点とする週ビュー（土曜開始）
  // まず今週の土曜の日付を計算
  const satOffset = todDow===6 ? 0 : -((todDow+1)%7);
  // todDow=0(日) → -1, 1(月)→-2, 2(火)→-3, ... 6(土)→0
  // つまり satOffset = todDow===6 ? 0 : -(todDow+1)
  const sat = new Date(today_d);
  sat.setDate(today_d.getDate() + (todDow===6 ? 0 : -(todDow+1)));
  // 土・日・月・火・水・木・金 を生成
  const order=[6,0,1,2,3,4,5];
  const days = order.map((di,i)=>{
    const date = new Date(sat);
    date.setDate(sat.getDate() + i);
    const dateStr = date.toISOString().slice(0,10);
    const todayDateStr = today_d.toISOString().slice(0,10);
    const isToday = dateStr === todayDateStr;
    const isPast = date < today_d && !isToday;
    return {dow:di, date, isToday, isPast};
  });

  const track=document.getElementById('wtrack');
  track.innerHTML=days.map(({dow,date,isToday,isPast})=>{
    const wo=WO[dow],food=FOOD[dow];
    const dd=date.getDate(),dj=DOW[dow];
    const bc=wo?wo.color:'#888';
    const tP=food?food.meals.reduce((s,m)=>s+(m.p||0),0):0;
    const tC=food?food.meals.reduce((s,m)=>s+(m.c||0),0):0;
    const tF=food?food.meals.reduce((s,m)=>s+(m.f||0),0):0;
    const tK=Math.round(tP*4+tC*4+tF*9);
    const exH=wo?wo.ex.map(e=>`<div class="exrow"><div class="exrow-head"><div class="exdot"></div><div class="exn">${e.n}</div><div class="exs">${e.s}</div></div>${e.how?`<div class="exhow">▸ ${e.how}</div>`:''}${e.tip?`<div class="extip">💡 ${e.tip}</div>`:''}</div>`).join(''):'<div style="font-size:10px;color:#aaa;padding:2px 0">筋肉が修復・成長する大切な日</div>';
    const mlH=food?food.meals.map(m=>`<div class="mitem m${m.t}"><div class="mstrip">${m.ts} ${m.t}</div><div class="mbody"><div class="mname">${m.n}</div><div class="mdetail">${m.d}</div>${m.a?`<div class="malt">代替：${m.a}</div>`:''}<div class="mmacros"><span class="mpill">P${m.p}g</span><span class="mpill">C${m.c}g</span><span class="mpill">F${m.f}g</span></div></div></div>`).join(''):'';
    return `<div class="dcard${isToday?' now':''}"><div class="dcard-hdr"><div class="dnum">${dd}</div><div class="dlwrap"><div class="dlname">${dj}曜${isToday?' ◀今日':isPast?' 終了':''}</div><div class="dltype">${wo?wo.label:'休養日'}</div></div><div class="dtag" style="background:${bc}18;color:${bc}">${wo?'トレ':'REST'}</div></div><div class="dcard-body"><div class="ex-lbl">筋トレ</div>${exH}<div class="msec"><div class="mlbl">食事 — P${tP} C${tC} F${tF} ${tK}kcal</div>${mlH}</div></div></div>`;
  }).join('');

  setTimeout(()=>{
    const c=track.querySelector('.now');
    if(c) track.parentElement.scrollLeft=Math.max(0,c.offsetLeft-16);
  },80);

  renderPrep();
}

function renderPrep(){
  const today_d=new Date(),nextDow=(today_d.getDay()+1)%7;
  const prep=getPrep(nextDow);
  const log=getLog(today());const pt=log.prep||{};
  let h=`<div class="prep-card"><div class="prep-hdr">🌙 明日（${DOW[nextDow]}曜）の準備</div><div class="prep-body">`;
  if(prep.rice) h+=`<div class="prep-rice"><div class="prep-rice-ico">🍚</div><div><div style="font-size:9px;color:var(--rule2);margin-bottom:1px;font-family:'DM Mono',monospace">炊くお米</div><div class="prep-rice-amt">${prep.rice.amt}</div><div class="prep-rice-note">${prep.rice.note}</div></div></div>`;
  if(prep.items.length){
    h+=`<div class="prep-slbl">仕込みリスト</div>`;
    h+=prep.items.map((t,i)=>`<div class="pitem"><input type="checkbox" id="pp${i}" ${pt['pp'+i]?'checked':''} onchange="togglePrep(this,'pp${i}')"><label for="pp${i}" class="${pt['pp'+i]?'ck':''}">${t}</label></div>`).join('');
  }
  if(prep.cook.length){
    h+=`<div class="prep-slbl" style="margin-top:7px">調理メモ</div>`;
    h+=prep.cook.map(c=>`<div class="cook-item">・${c}</div>`).join('');
  }
  h+=`</div></div>`;
  document.getElementById('prep-sec').innerHTML=h;
}

function togglePrep(el,key){
  const log=getLog(today());
  if(!log.prep)log.prep={};
  log.prep[key]=el.checked;
  el.nextElementSibling.classList.toggle('ck',el.checked);
  saveLog2(today(),log);
}

// ═══════════════════════════════════════════════
// MEAL ENTRY (sendPrompt → manual PFC input)
// ═══════════════════════════════════════════════
let meals=[];
let pendingMeal=null; // {id, timing, name}

function addMeal(){
  const name=document.getElementById('add-name').value.trim();
  const timing=document.getElementById('add-timing').value;
  if(!name){
    alert('食事名を入力してください');
    document.getElementById('add-name').focus();
    return;
  }

  // Store pending meal
  pendingMeal={id:Date.now(),timing,name};

  // Copy prompt to clipboard
  const prompt='「'+name+'」のPFC教えて（P/C/F gで）';
  let copied=false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(prompt);
      copied=true;
    }else{
      const ta=document.createElement('textarea');
      ta.value=prompt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copied=true;
    }
  }catch(e){copied=false;}

  // Show manual input row
  const mr=document.getElementById('manual-row');
  mr.style.display='block';
  document.getElementById('man-p').value='';
  document.getElementById('man-c').value='';
  document.getElementById('man-f').value='';

  // Update notice
  const noteEl=document.getElementById('manual-note');
  if(noteEl){
    if(copied){
      noteEl.innerHTML='<b style="color:var(--grn)">✓ クリップボードにコピー済み</b><br>' +
        '<span style="font-size:10px;color:var(--rule2)">下のチャット欄に貼り付けて送信 → Claudeが返信した数値を入力してください</span>' +
        '<div style="font-family:DM Mono,monospace;font-size:11px;background:white;padding:5px 7px;border-radius:3px;margin-top:5px;border:1px solid var(--rule);word-break:break-all">'+prompt+'</div>';
    }else{
      noteEl.innerHTML='<span style="color:var(--amb)">⚠ コピーできませんでした。下のテキストを手動でコピーしてください：</span>' +
        '<div style="font-family:DM Mono,monospace;font-size:11px;background:white;padding:5px 7px;border-radius:3px;margin-top:5px;border:1px solid var(--rule);word-break:break-all;user-select:all">'+prompt+'</div>';
    }
  }

  setTimeout(()=>document.getElementById('man-p').focus(),100);
}

function confirmMeal(){
  if(!pendingMeal)return;
  const p=parseInt(document.getElementById('man-p').value)||0;
  const c=parseInt(document.getElementById('man-c').value)||0;
  const f=parseInt(document.getElementById('man-f').value)||0;
  meals.push({...pendingMeal,p,c,f});
  pendingMeal=null;
  document.getElementById('add-name').value='';
  document.getElementById('manual-row').style.display='none';
  renderMeals();updateTotals();updateTmpl();
}

function cancelMeal(){
  pendingMeal=null;
  document.getElementById('manual-row').style.display='none';
  document.getElementById('add-name').value='';
}

function removeMeal(id){
  meals=meals.filter(m=>m.id!==id);
  renderMeals();updateTotals();updateTmpl();
}

function renderMeals(){
  const el=document.getElementById('meal-list');
  if(!meals.length){el.innerHTML='';return;}
  el.innerHTML=meals.map(m=>`
    <div class="meal-input-row">
      <div class="mit-body">
        <div class="mit-timing">${m.timing}</div>
        <div class="mit-name">${m.name}</div>
        <div class="mit-pfc">
          <span class="mit-pill p">P ${m.p}g</span>
          <span class="mit-pill c">C ${m.c}g</span>
          <span class="mit-pill f">F ${m.f}g</span>
        </div>
      </div>
      <button class="mit-del" onclick="removeMeal(${m.id})">×</button>
    </div>`).join('');
}

function updateTotals(){
  const done=meals.filter(m=>!m.loading);
  const tP=done.reduce((s,m)=>s+(m.p||0),0);
  const tC=done.reduce((s,m)=>s+(m.c||0),0);
  const tF=done.reduce((s,m)=>s+(m.f||0),0);
  const tK=Math.round(tP*4+tC*4+tF*9);
  document.getElementById('tot-p').textContent=tP+'g';
  document.getElementById('tot-c').textContent=tC+'g';
  document.getElementById('tot-f').textContent=tF+'g';
  document.getElementById('tot-k').textContent=tK;
  const pct=Math.min(100,Math.round(tP/136*100));
  document.getElementById('p-pct').textContent=pct+'%';
  document.getElementById('p-bar').style.width=pct+'%';
}

// ═══════════════════════════════════════════════
// LOG SAVE
// ═══════════════════════════════════════════════
function saveLog(){
  const day=document.getElementById('log-day').value;
  const wt=parseFloat(document.getElementById('log-wt').value)||null;
  const rating=parseInt(document.getElementById('log-rating').value);
  const note=document.getElementById('log-note').value.trim();
  if(!note&&!meals.length){alert('筋トレメモか食事を入力してください');return;}
  const log=getLog(today());
  log.workout={day,rating,note};
  log.meals=[...meals];
  if(wt)log.wt=wt;
  saveLog2(today(),log);
  updateTmpl();renderHist();
  alert('保存しました！');
}

// ═══════════════════════════════════════════════
// TEMPLATE
// ═══════════════════════════════════════════════
function updateTmpl(){
  const d=new Date();
  const diff=Math.floor((d-new Date(START))/86400000);
  const wt=document.getElementById('log-wt').value||'未記録';
  const day=document.getElementById('log-day').value;
  const rating=parseInt(document.getElementById('log-rating').value);
  const note=document.getElementById('log-note').value||'特になし';
  const done=meals.filter(m=>!m.loading);
  const tP=Math.round(done.reduce((s,m)=>s+(m.p||0),0));
  const tC=Math.round(done.reduce((s,m)=>s+(m.c||0),0));
  const tF=Math.round(done.reduce((s,m)=>s+(m.f||0),0));
  const tK=Math.round(tP*4+tC*4+tF*9);
  const ml=meals.length?meals.map(m=>`  ${m.timing}：${m.name}${m.p!=null?` (P${m.p}/C${m.c}/F${m.f})`:' (推定中)'}`).join('\n'):'  未記録';
  document.getElementById('tmpl-text').textContent=`📋 ${d.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})} の記録
─────────────────
【基本情報】
・開始${Math.max(1,diff+1)}日目
・体重：${wt}kg

【筋トレ】
・メニュー：${day}
・達成度：${'★'.repeat(rating)+'☆'.repeat(3-rating)}
・メモ：${note}

【食事】
${ml}
・合計：P${tP}g / C${tC}g / F${tF}g / ${tK}kcal
・P目標(136g)達成率：${Math.round(tP/136*100)}%

【今日の感想・気になること】
（ここに追記してClaudeに送る）`;
}

function copyTmpl(){
  const text=document.getElementById('tmpl-text').textContent;
  navigator.clipboard.writeText(text)
    .then(()=>alert('コピーしました！\nこのチャットに貼り付けてください'))
    .catch(()=>{
      const ta=document.createElement('textarea');ta.value=text;
      document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      alert('コピーしました！');
    });
}

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
function renderHist(){
  const all=getAll(),keys=Object.keys(all).sort().reverse();
  const el=document.getElementById('hist-list');
  if(!keys.length){el.innerHTML='<div class="empty">記録を始めると表示されます</div>';return;}
  el.innerHTML=keys.map(k=>{
    const log=all[k];
    const d2=new Date(k+'T00:00:00');
    const lbl=d2.toLocaleDateString('ja-JP',{month:'short',day:'numeric',weekday:'short'});
    const done=(log.meals||[]).filter(m=>m.p!=null);
    const tP=done.reduce((s,m)=>s+(m.p||0),0);
    const wo=log.workout;
    return `<div class="hist-item"><div class="hist-date">${lbl}</div><div class="hist-title">${wo?wo.day:'食事のみ'} ${wo?'★'.repeat(wo.rating)+'☆'.repeat(3-wo.rating):''}</div><div class="hist-body">${wo&&wo.note?wo.note+'<br>':''}${tP?`P${Math.round(tP)}g記録`:'食事未記録'}${log.wt?` · ${log.wt}kg`:''}</div></div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function nav(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='week')renderWeek();
  if(id==='hist')renderHist();
  if(id==='log')updateTmpl();
}

// INIT (with error visibility for debugging)

window.addEventListener('error',function(e){
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;top:0;left:0;right:0;background:#b83232;color:white;padding:8px 12px;font-size:12px;z-index:9999;font-family:monospace';
  banner.textContent='JSエラー: '+e.message+' @'+e.lineno;
  document.body.appendChild(banner);
});

try{
  renderHdr();
}catch(e){alert('renderHdr失敗: '+e.message);}
try{
  renderWeek();
}catch(e){alert('renderWeek失敗: '+e.message);}
try{
  updateTmpl();
}catch(e){alert('updateTmpl失敗: '+e.message);}
</script>
